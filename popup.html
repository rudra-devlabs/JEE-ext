<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JEE Study Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="libs/katex/katex.min.css">
</head>
<body class="dark-theme">
  <header class="popup-header">
    <h1 class="popup-logo">JEE Dashboard</h1>
    <div style="display: flex; gap: 8px;">
      <button id="openPopupChat" class="open-chat-btn" title="AI Chat" style="background: transparent; border: none; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: 4px; transition: color 0.2s;">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      </button>
      <button id="openDashboard" class="open-dash-btn" title="Open full dashboard"></button>
    </div>
  </header>

  <nav class="popup-tabs">
    <button class="popup-tab active" data-tab="countdown">Countdown</button>
    <button class="popup-tab" data-tab="questions">Questions</button>
    <button class="popup-tab" data-tab="mistakes">Mistakes</button>
    <button class="popup-tab" data-tab="backlog">Backlog</button>
    <button class="popup-tab" data-tab="timer">Timer</button>
    <button class="popup-tab" data-tab="notes">Notes</button>
  </nav>

  <main class="popup-content">
    <!-- Countdown Tab -->
    <section class="ppanel active" id="panel-countdown">
      <div class="countdown-compact">
        <div class="cd-grid">
          <div class="cd-box"><span class="cd-num" id="cd-days">0</span><span class="cd-label">Days</span></div>
          <div class="cd-box"><span class="cd-num" id="cd-hours">00</span><span class="cd-label">Hours</span></div>
          <div class="cd-box"><span class="cd-num" id="cd-mins">00</span><span class="cd-label">Mins</span></div>
          <div class="cd-box"><span class="cd-num" id="cd-secs">00</span><span class="cd-label">Secs</span></div>
        </div>
        <p class="cd-quote" id="cd-quote"></p>
        <p class="streak-number" id="streak">0 day streak</p>
        <div id="popup-test-alert" class="popup-test-alert" style="display:none;"></div>
      </div>
    </section>

    <!-- Questions Tab -->
    <section class="ppanel" id="panel-questions">
      <div class="p-form">
        <div class="p-row">
          <select id="q-cat" class="p-select">
            <option selected>Class</option><option>Topic</option><option>Module</option><option>DIBY</option>
            <option>DPP</option><option>KPP</option><option>Homework</option>
          </select>
          <input type="text" id="q-num" class="p-input" placeholder="Question (e.g. Q.42)" autocomplete="off">
        </div>
        <div class="p-row">
          <input type="text" id="q-chap" class="p-input" placeholder="Chapter / Topic" autocomplete="off">
          <input type="text" id="q-lec" class="p-input" placeholder="Lecture No." autocomplete="off">
        </div>
        <div class="p-row">
          <input type="text" id="q-tags" class="p-input" placeholder="Tags (optional)" list="q-tag-list" autocomplete="off">
          <datalist id="q-tag-list"></datalist>
          <label class="p-btn p-btn-ghost" title="Attach Image" style="padding: 6px 10px; cursor: pointer;">
            <input type="file" id="q-img-upload" accept="image/*" multiple style="display:none">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
          </label>
          <button id="q-screenshot-btn" class="p-btn p-btn-ghost" title="Capture Visible Tab" style="padding: 6px 10px;">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
          </button>
          <button id="q-add" class="p-btn p-btn-primary" title="Press Ctrl+Enter to Add">Add</button>
        </div>
        <div id="q-img-preview" class="multi-img-preview" style="display:none;"></div>
      </div>
      <div class="p-list" id="q-list"></div>
    </section>

    <!-- Mistakes Tab -->
    <section class="ppanel" id="panel-mistakes">
      <div class="p-form">
        <div class="p-row">
          <select id="m-subject" class="p-select">
            <option>Physics</option><option>Chemistry</option><option>Mathematics</option><option>Other</option>
          </select>
        </div>
        <textarea id="m-text" class="p-textarea" placeholder="What went wrong?" rows="2"></textarea>
        <div id="m-img-preview" class="multi-img-preview" style="display:none;"></div>
        <div class="p-row">
          <input type="text" id="m-tags" class="p-input" placeholder="Tags (optional)" list="m-tag-list" autocomplete="off">
          <datalist id="m-tag-list"></datalist>
          <button id="m-add" class="p-btn p-btn-primary">Log</button>
        </div>
      </div>
      <div class="p-list" id="m-list"></div>
    </section>

    <!-- Backlog Tab -->
    <section class="ppanel" id="panel-backlog">
      <div class="p-form">
        <div class="p-row">
          <input type="text" id="b-input" class="p-input" placeholder="Chapter / lecture..." autocomplete="off">
          <button id="b-add" class="p-btn p-btn-primary">Add</button>
        </div>
      </div>
      <div class="b-progress-wrap">
        <div class="b-progress-bar"><div class="b-progress-fill" id="b-fill"></div></div>
        <span class="b-progress-text" id="b-text">0 of 0 complete</span>
      </div>
      <div class="p-list" id="b-list"></div>
    </section>

    <!-- Timer Tab -->
    <section class="ppanel" id="panel-timer">
      <div class="timer-presets-compact">
        <button class="tp-btn active" data-focus="25" data-break="5">25/5</button>
        <button class="tp-btn" data-focus="50" data-break="10">50/10</button>
        <button class="tp-btn" data-focus="custom" data-break="custom">Custom</button>
      </div>
      <div id="custom-timer-wrap" style="display:none" class="p-row">
        <input type="number" id="t-custom-focus" class="p-input p-input-sm" value="30" min="1" max="120" placeholder="Focus">
        <span class="timer-sep">/</span>
        <input type="number" id="t-custom-break" class="p-input p-input-sm" value="5" min="1" max="30" placeholder="Break">
        <span class="timer-sep">min</span>
      </div>
      <div class="timer-display-compact" id="t-display">25:00</div>
      <div class="timer-mode-label" id="t-mode">Focus</div>
      <div class="timer-controls-compact">
        <button id="t-start" class="p-btn p-btn-primary">Start</button>
        <button id="t-reset" class="p-btn p-btn-ghost">Reset</button>
      </div>
      <div class="timer-stats" id="t-stats">Today: 0 sessions · Streak: 0</div>
    </section>

    <!-- Notes Tab -->
    <section class="ppanel" id="panel-notes">
      <div id="p-notes-container" class="p-notes-container"></div>
    </section>
  </main>

  <div id="popup-chat-overlay" style="display: none; position: absolute; top: 49px; left: 0; right: 0; bottom: 0; background: var(--bg-primary); z-index: 50; overflow: hidden; flex-direction: column;">
    <div id="p-chat-container" style="height: 100%; display: flex; flex-direction: column; overflow: hidden; min-height: 0;"></div>
  </div>

  <div id="p-toast" class="p-toast-container"></div>

  <script src="libs/marked/marked.min.js"></script>
  <script src="libs/katex/katex.min.js"></script>
  <script src="libs/puter.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
